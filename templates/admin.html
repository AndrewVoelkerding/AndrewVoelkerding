<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Website Content Manager</title>
    <style>
        body { font-family: monospace; background: #0F172A; color: #E2E8F0; padding: 2rem; }
        h1 { margin-bottom: 1rem; color: #C59B27; }
        textarea { width: 100%; height: 70vh; background: #1E293B; color: #38BDF8; border: 1px solid #334155; padding: 1rem; font-size: 0.9rem; border-radius: 6px; }
        .btn-save { margin-top: 1rem; padding: 0.75rem 1.5rem; background: #C59B27; color: #0F172A; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 1rem; }
        .btn-save:hover { background: #EAB308; }
    </style>
</head>
<body>
    <h1>Website Plain-Text Content Editor</h1>
    <p style="margin-bottom: 1rem; color: #94A3B8;">Edit the text structure below and click save to immediately update your website.</p>
    <form action="/admin" method="POST">
        <textarea name="json_content">{{ raw_data }}</textarea>
        <br>
        <button type="submit" class="btn-save">Save & Update Website</button>
    </form>
</body>
</html>
